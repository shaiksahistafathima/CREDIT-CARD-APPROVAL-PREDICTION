<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Credit Card Approval System{% endblock %}</title>
    <!-- Modern Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS variables matching the specified premium light-theme palette */
        :root {
            --primary: #0056D2;
            --on-primary: #FFFFFF;
            --primary-hover: #004BB5;
            --ink: #1F1F1F;
            --ink-muted: #5C5C5C;
            --ink-subdued: #8C8C8C;
            --canvas: #FFFFFF;
            --canvas-subdued: #F8FAFC;
            --surface-1: #FFFFFF;
            --surface-2: #F1F5F9;
            --border: #E2E8F0;
            --border-subtle: #F1F5F9;
            --grade-pass: #1FA15F;
            --grade-fail: #D9534F;
            
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.03), 0 2px 8px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 40px -15px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Base Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--canvas-subdued);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Clean Premium Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2.5rem;
            background-color: var(--surface-1);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 2.2rem;
            height: 2.2rem;
            background-color: var(--primary);
            color: var(--on-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--ink);
        }

        nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--ink-muted);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            transition: var(--transition);
        }

        .nav-link:hover {
            color: var(--primary);
            background-color: var(--surface-2);
        }

        .nav-link.active {
            color: var(--on-primary);
            background-color: var(--primary);
        }

        /* Main Container */
        main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        /* Card base styling */
        .card {
            background-color: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.25rem;
            box-shadow: var(--shadow-sm);
        }

        /* Table styles */
        .table-container {
            width: 100%;
            overflow-x: auto;
            background-color: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 0.95rem;
        }

        th {
            font-weight: 600;
            color: var(--ink-muted);
            background-color: var(--canvas-subdued);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-approved {
            background-color: rgba(31, 161, 95, 0.1);
            color: var(--grade-pass);
        }

        .badge-denied {
            background-color: rgba(217, 83, 79, 0.1);
            color: var(--grade-fail);
        }

        /* Section Layout details */
        .section-header {
            margin: 3rem 0 1.5rem 0;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .section-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--ink);
        }

        .section-header p {
            color: var(--ink-muted);
            font-size: 1rem;
        }

        /* Mobile responsiveness media queries */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1.25rem 1.5rem;
            }
            nav {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 0.25rem;
            }
            .nav-link {
                font-size: 0.85rem;
                padding: 0.5rem 0.8rem;
            }
            main {
                margin: 1.5rem auto;
                padding: 0 1rem;
            }
            .card {
                padding: 1.5rem;
            }
            .table-container table {
                min-width: 750px;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <a href="/" class="logo-container">
            <div class="logo-text">Credit Approval</div>
        </a>
        <nav>
            <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
            <a href="/predictor" class="nav-link {% if active_page == 'predictor' %}active{% endif %}">Predict Eligibility</a>
            <a href="/docs" class="nav-link {% if active_page == 'docs' %}active{% endif %}">Data Specs</a>
            <a href="/portal" class="nav-link {% if active_page == 'portal' %}active{% endif %}">Project Portal</a>
        </nav>
    </header>

    <!-- Main Container -->
    <main>
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
